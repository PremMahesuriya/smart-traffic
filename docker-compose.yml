version: '3.8'

services:
  # 1. MongoDB Service
  mongodb:
    image: mongo:6.0
    container_name: smart_traffic_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  # 2. REST API Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart_traffic_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/smart_traffic
      - NODE_ENV=production
    depends_on:
      - mongodb
    restart: unless-stopped

  # 3. React Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart_traffic_frontend
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    restart: unless-stopped

  # 4. Main AI Video Processing Service
  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: smart_traffic_ai
    environment:
      - BACKEND_URL=http://backend:5000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
